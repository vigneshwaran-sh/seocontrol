# MissionControl reverse proxy (HTTP-only).
# TLS is terminated at Cloudflare; Cloudflare connects to this origin over
# plain HTTP on port 80 and routes by Host header:
#   shipseo.reviewhandy.com      -> frontend
#   api-shipseo.reviewhandy.com  -> backend

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8000;
}

# Frontend
server {
    listen 80;
    server_name shipseo.reviewhandy.com;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Honour Cloudflare's scheme (it sends X-Forwarded-Proto: https).
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

# Backend API
server {
    listen 80;
    server_name api-shipseo.reviewhandy.com;

    # Allow larger payloads (skill content, blog JSON, image uploads).
    client_max_body_size 25m;

    location / {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Streaming / long LLM-triggered requests shouldn't time out early.
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
    }
}

# Reject requests with an unknown Host.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
